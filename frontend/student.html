<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">

        <div class="logo">
            <img src="logo.png">
            <div>
                <h3>MAHARANI CLUSTER</h3>
                <p>UNIVERSITY</p>
            </div>
        </div>

        <div class="card" id="card">

            <!-- LOGIN -->
            <div class="side front">
                <div class="form-content">

                    <h1>Login</h1>
                    <p class="subtitle">Enter your account details</p>

                    <input type="text" placeholder="UUCMS No">

                    <div class="password-field">
                        <input type="password" placeholder="Password" id="pass1">
                        <span onclick="togglePassword('pass1')">👁</span>
                    </div>

                    <a href="#" class="forgot">Forget Password?</a>

                    <button>Login</button>

                    <div class="bottom-text">
                        Don’t have an account ?
                        <span onclick="flipToSignup()">Sign up</span>
                    </div>

                </div>
            </div>

            <!-- SIGNUP -->
            <div class="side back">
                <div class="form-content">

                    <h1>Sign Up</h1>
                    <p class="subtitle">Enter your details to continue</p>

                    <input type="text" placeholder="UUCMS No">
                    <input type="email" placeholder="Email-ID">

                    <div class="password-field">
                        <input type="password" placeholder="Password" id="pass2">
                        <span onclick="togglePassword('pass2')">👁</span>
                    </div>

                    <button>Sign Up</button>

                    <div class="bottom-text">
                        Already have an account?
                        <span onclick="flipToLogin()">Login</span>
                    </div>

                </div>
            </div>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="top-icons">
            <div class="circle active">S</div>
            <div class="circle" onclick="location.href='admin.html'">A</div>
        </div>

        <div class="image-box">
            <img src="student.png">
        </div>

        <div class="watermark">STUDENT</div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
