<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container admin-page">

    <!-- LEFT IMAGE -->
    <div class="left">

        <div class="top-icons">
            <div class="circle" onclick="location.href='student.html'">S</div>
            <div class="circle active">A</div>
        </div>

        <div class="image-box">
            <img src="admin.png">
        </div>

        <div class="watermark">ADMIN</div>

    </div>

    <!-- RIGHT FORM -->
    <div class="right">

        <div class="logo">
            <div>
                <h3>MAHARANI CLUSTER</h3>
                <p>UNIVERSITY</p>
            </div>
            <img src="logo.png">
        </div>

        <div class="form-content">

            <h1>Login</h1>
            <p class="subtitle">Enter admin details</p>

            <input type="text" placeholder="Email-ID">

            <div class="password-field">
                <input type="password" placeholder="Password" id="adminpass">
                <span onclick="togglePassword('adminpass')">👁</span>
            </div>

            <a href="#" class="forgot">Forget Password?</a>

            <button>Login</button>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
